<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Live QR</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://i.ibb.co/DDpFdFTW/upiwebapp.png"
    />

    <style>
      body {
        background: linear-gradient(135deg, #eef2ff, #ffffff);
        font-family: sans-serif;
      }
      .glass {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      }
      .fade {
        animation: fade 0.4s ease;
      }
      @keyframes fade {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* Corporate popup */
      .popup {
        animation: pop 0.4s ease;
      }
      @keyframes pop {
        from {
          transform: scale(0.8);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
    <style>
      .dot {
        width: 10px;
        height: 10px;
        background: #6366f1;
        border-radius: 50%;
        animation: bounce 1s infinite ease-in-out;
      }

      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      /* Fade out */
      .loader-hide {
        opacity: 0;
        visibility: hidden;
        transition: all 0.5s ease;
      }
    </style>


<!-- ANIMATION -->
<style>
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.animate-fadeIn {
  animation: fadeIn 0.6s ease;
}
</style>

  </head>

  <body class="flex items-center justify-center min-h-screen">
    <!-- LOADER -->
    <div
      id="loader"
      class="fixed inset-0 flex items-center justify-center bg-white z-[9999]"
    >
      <div class="text-center">
        <!-- Logo (optional) -->
        <img
          src="https://i.ibb.co/DDpFdFTW/upiwebapp.png"
          class="h-16 mx-auto mb-4 animate-pulse"
        />

        <!-- Spinner -->
        <div class="flex gap-2 justify-center">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>

        <p class="mt-4 text-sm text-gray-500">Loading QR Code...</p>
      </div>
    </div>

    <script>
      window.addEventListener("load", function () {
        setTimeout(() => {
          document.getElementById("loader").classList.add("loader-hide");
        }, 1000); // 1 sec delay for smooth feel
      });
    </script>

    <!-- QR CONTAINER -->
<div class="min-h-screen flex items-center justify-center px-4">

  <div id="qrContainer"
    class="w-full max-w-sm sm:max-w-md md:max-w-lg 
    bg-white/70 backdrop-blur-2xl border border-white/40
    shadow-2xl rounded-3xl p-6 sm:p-8 text-center 
    transition-all duration-500 animate-fadeIn">

    <!-- HEADER -->
    <h2 class="text-2xl sm:text-3xl font-semibold text-gray-800 tracking-tight">
      💳 Scan & Pay
    </h2>

    <p id="shopName"
      class="text-gray-500 text-sm mt-1 truncate">
    </p>

    <!-- QR BOX -->
    <div id="qrBox"
      class="flex justify-center items-center my-6 
      p-4 rounded-2xl bg-white shadow-inner border">
    </div>

    <!-- UPI APPS -->
    <div class="flex justify-center gap-4 mt-3 flex-wrap">
      <img src="https://i.ibb.co/JFwXn4dR/pngwing-com-3.png"
        class="h-10 w-auto rounded-lg shadow hover:scale-110 transition duration-300" />
      <img src="https://i.ibb.co/1tTCZ7f4/icons8-paytm-144.png"
        class="h-10 w-auto rounded-lg shadow hover:scale-110 transition duration-300 bg-white p-1" />
      <img src="https://i.ibb.co/jm82WDF/icons8-google-pay-144.png"
        class="h-10 w-auto rounded-lg shadow hover:scale-110 transition duration-300 bg-white p-1" />
        <img src="https://i.ibb.co/vvRXqCyV/icons8-amazon-144.png"
        class="h-10 w-auto rounded-lg shadow hover:scale-110 transition duration-300 bg-white p-1" />
         <img src="https://i.ibb.co/tT7PJd9N/icons8-bhim-144.png"
        class="h-10 w-auto rounded-lg shadow hover:scale-110 transition duration-300 bg-white p-1" />
    </div>

    <!-- AMOUNT CARD -->
    <div class="mt-6 flex justify-center">
      <div
        class="px-6 py-4 rounded-2xl bg-gradient-to-br from-indigo-50 to-white 
        shadow-lg border border-gray-200 w-full max-w-xs">

        <p class="text-xs uppercase tracking-wider text-gray-400">
          Amount Payable
        </p>

        <p id="amountText"
          class="text-3xl sm:text-4xl font-bold text-indigo-600 mt-1">
          ₹ 0
        </p>
      </div>
    </div>

    <!-- TIMER -->
    <div class="mt-6">
      <p class="text-xs text-gray-400 uppercase tracking-wide">
        Time Remaining
      </p>

      <p id="timer"
        class="text-red-500 font-bold text-2xl sm:text-3xl mt-1 animate-pulse">
        60
      </p>
    </div>

    <!-- FOOTER -->
    <p class="text-xs text-gray-400 mt-3">
      Secure UPI Payment • Auto updating
    </p>

  </div>
</div>


    <!-- THANK YOU SCREEN -->
    <div
      id="thankScreen"
      class="hidden fixed inset-0 flex items-center justify-center bg-gradient-to-br from-gray-100 to-white"
    >
      <div
        class="glass p-8 text-center max-w-sm w-full popup border border-gray-200"
      >
        <!-- Icon -->
        <div class="text-4xl mb-3">✅</div>

        <!-- Heading -->
        <h2 class="text-2xl font-bold text-gray-800 mb-1">
          Payment Session Closed
        </h2>

        <!-- Subtext -->
        <p class="text-gray-500 mb-4 text-sm">
          Thank you for choosing our service
        </p>

        <!-- Shop Name -->
        <p
          id="shopFinal"
          class="text-lg font-semibold text-indigo-600 mb-2"
        ></p>

        <!-- Footer Text -->
        <p class="text-xs text-gray-400">
          Secure • Fast • Trusted UPI Payments
        </p>
      </div>
    </div>

    <script>
      let lastTime = 0;
      let timerInterval;
      let currentShop = "";

      // Load QR
      function loadQR() {
        let data = JSON.parse(localStorage.getItem("upiData"));
        if (!data) return;

        if (data.time === lastTime) return;

        lastTime = data.time;
        currentShop = data.shop;

        let url = `upi://pay?pa=${data.upi}&pn=${data.shop}&am=${data.amount}&tn=${data.product}&cu=INR`;

        document.getElementById("qrBox").innerHTML = "";

        new QRCode(document.getElementById("qrBox"), {
          text: url,
          width: 220,
          height: 220,
        });

        // show details
        document.getElementById("amountText").innerText = "₹ " + data.amount;
        document.getElementById("shopName").innerText = data.shop;

        // reset UI
        document.getElementById("qrContainer").classList.remove("hidden");
        document.getElementById("thankScreen").classList.add("hidden");

        startTimer();
      }

      // Timer
      function startTimer() {
        clearInterval(timerInterval);

        let time = 60;
        document.getElementById("timer").innerText = time;

        timerInterval = setInterval(() => {
          time--;
          document.getElementById("timer").innerText = time;

          if (time <= 0) {
            clearInterval(timerInterval);

            // 🔥 Hide QR + Show Thank You Screen
            document.getElementById("qrContainer").classList.add("hidden");
            document.getElementById("thankScreen").classList.remove("hidden");

            document.getElementById("shopFinal").innerText = currentShop;
          }
        }, 1000);
      }

      // Auto refresh
      setInterval(loadQR, 1000);
      loadQR();
    </script>
  </body>
</html>
