<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YK OFFICIAL | Secure Live QR</title>
     <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://i.ibb.co/DDpFdFTW/upiwebapp.png"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 0% 0%, #f1f5f9 0%, #e2e8f0 100%);
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }
        .qr-wrapper {
            background: white;
            padding: 1rem;
            border-radius: 1.5rem;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
            border: 1px solid #f1f5f9;
        }
        /* Pulse for the timer */
        .timer-low {
            color: #ef4444;
            animation: pulse-red 1s infinite;
        }
        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        /* Smooth Entrance */
        .animate-pop {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        /* Loader Dots */
        .dot {
            width: 8px;
            height: 8px;
            background: #6366f1;
            border-radius: 50%;
            animation: bounce 0.6s infinite alternate;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            to { transform: translateY(-8px); opacity: 0.4; }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div id="loader" class="fixed inset-0 flex flex-col items-center justify-center bg-white z-[9999] transition-opacity duration-500">
        <div class="flex gap-2">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <p class="mt-4 text-xs font-bold uppercase tracking-widest text-indigo-600">Generating Secure QR</p>
    </div>

    <div id="qrContainer" class="w-full max-w-md glass-panel rounded-[2.5rem] p-8 text-center animate-pop relative hidden">
        
        <div class="flex items-center justify-center gap-2 mb-6">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-ping"></div>
            <span class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Live Secure Connection</span>
        </div>

        <h2 class="text-2xl font-bold text-gray-900">Scan to Pay</h2>
        <p id="shopName" class="text-indigo-600 font-semibold text-sm mt-1"></p>

        <div class="mt-8 flex justify-center">
            <div class="qr-wrapper relative">
                <div id="qrBox"></div>
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center shadow-lg border border-gray-100">
                        <img src="https://i.ibb.co/DDpFdFTW/upiwebapp.png" class="w-6 h-6" alt="Logo">
                    </div>
                </div>
            </div>
        </div>

        <div class="flex justify-center items-center gap-4 mt-8   transition-all duration-500">
            <img src="https://i.ibb.co/JFwXn4dR/pngwing-com-3.png" class="h-6 " alt="PhonePe">
            <img src="https://i.ibb.co/jm82WDF/icons8-google-pay-144.png" class="h-6 " alt="GPay">
            <img src="https://i.ibb.co/1tTCZ7f4/icons8-paytm-144.png" class="h-6 " alt="Paytm">
            <img src="https://i.ibb.co/tT7PJd9N/icons8-bhim-144.png" class="h-6 " alt="BHIM">
        </div>

        <div class="mt-8 bg-gray-50/50 rounded-2xl p-5 border border-gray-100">
            <div class="flex justify-between items-end">
                <div class="text-left">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tight">Amount to Pay</p>
                    <p id="amountText" class="text-3xl font-bold text-gray-900 leading-none mt-1">₹ 0.00</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tight">Expires In</p>
                    <p id="timer" class="text-2xl font-bold text-gray-900 tabular-nums leading-none mt-1">60s</p>
                </div>
            </div>
        </div>

        <div class="mt-6 flex items-center justify-center gap-2 text-[10px] text-gray-400 font-medium">
            <i data-lucide="lock" class="w-3 h-3"></i>
            End-to-End Encrypted UPI Transaction
        </div>
    </div>

    <div id="thankScreen" class="hidden w-full max-w-sm glass-panel rounded-[2.5rem] p-10 text-center animate-pop">
        <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i data-lucide="clock" class="text-indigo-600 w-10 h-10"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-900">Session Closed</h2>
        <p class="text-gray-500 text-sm mt-2 leading-relaxed">The payment window for <br><span id="shopFinal" class="font-bold text-indigo-600"></span> has expired.</p>
        
        <button onclick="window.close()" class="mt-8 w-full py-4 bg-gray-900 text-white rounded-2xl font-bold text-sm hover:bg-indigo-600 transition-all">
            Return to Portal
        </button>
    </div>

    <script>
        lucide.createIcons();
        let lastTime = 0;
        let timerInterval;
        let currentShop = "";

        // Preloader Logic
        window.addEventListener("load", () => {
            setTimeout(() => {
                document.getElementById("loader").classList.add("opacity-0");
                setTimeout(() => document.getElementById("loader").remove(), 500);
                loadQR();
            }, 1000);
        });

        function loadQR() {
            const rawData = localStorage.getItem("upiData");
            if (!rawData) return;
            
            const data = JSON.parse(rawData);
            if (data.timeStamp === lastTime) return;

            lastTime = data.timeStamp;
            currentShop = data.shop;

            // Generate UPI URL
            const url = `upi://pay?pa=${data.upi}&pn=${encodeURIComponent(data.shop)}&am=${data.amount}&tn=${encodeURIComponent(data.product)}&cu=INR`;

            const qrBox = document.getElementById("qrBox");
            qrBox.innerHTML = "";

            new QRCode(qrBox, {
                text: url,
                width: 220,
                height: 220,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            document.getElementById("amountText").innerText = "₹ " + parseFloat(data.amount).toLocaleString('en-IN');
            document.getElementById("shopName").innerText = data.shop;

            document.getElementById("qrContainer").classList.remove("hidden");
            document.getElementById("thankScreen").classList.add("hidden");

            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            let timeLeft = 60;
            const timerEl = document.getElementById("timer");
            
            timerEl.innerText = timeLeft + "s";
            timerEl.classList.remove("timer-low");

            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft + "s";

                if(timeLeft <= 10) timerEl.classList.add("timer-low");

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById("qrContainer").classList.add("hidden");
                    document.getElementById("thankScreen").classList.remove("hidden");
                    document.getElementById("shopFinal").innerText = currentShop;
                }
            }, 1000);
        }

        // Listen for new QR requests from the main page
        window.addEventListener('storage', (e) => {
            if (e.key === 'upiData') loadQR();
        });

        // Initialize
        loadQR();
    </script>
</body>
</html>
